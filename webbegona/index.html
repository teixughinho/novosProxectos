<!<!DOCTYPE html>
<html lang="gl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;900&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; }
body { margin: 0; font-family: 'Nunito', sans-serif; overflow: hidden; background: #07090f; }

#portada {
  position: fixed; inset: 0; z-index: 9999;
  display: flex; align-items: center; justify-content: center;
}
#portada-bg {
  position: absolute; inset: 0;
  background: url('imax/begonha2.png') center top / cover no-repeat;
  filter: brightness(.18) saturate(.4);
}
.portada-inner {
  position: relative; z-index: 1; text-align: center; color: #fff;
  padding: 36px 28px; max-width: 400px; width: 92%;
  background: rgba(5,10,24,.82);
  border: 1.5px solid rgba(0,229,255,.3); border-radius: 28px;
  box-shadow: 0 0 60px rgba(0,229,255,.08), 0 20px 60px rgba(0,0,0,.5);
}
.portada-divider {
  width: 60px; height: 3px; margin: 0 auto 24px;
  background: linear-gradient(90deg, transparent, #ff4d6d, transparent); border-radius: 2px;
}
.portada-foto {
  width: 110px; height: 110px; border-radius: 50%;
  border: 3px solid #ff4d6d; object-fit: cover; object-position: top;
  box-shadow: 0 0 0 8px rgba(255,77,109,.1), 0 0 40px rgba(255,77,109,.45);
  margin: 0 auto 18px; display: block;
}
.portada-nome {
  font-family: 'Outfit', sans-serif; font-size: 2rem; font-weight: 900;
  letter-spacing: .04em; text-transform: uppercase; line-height: 1.05; margin: 0;
}
.portada-nome span { color: #ff4d6d; }
.portada-data {
  display: inline-block; margin: 10px 0 24px;
  font-size: .68rem; color: #aaa; letter-spacing: .25em; text-transform: uppercase;
  border: 1px solid rgba(255,77,109,.3); padding: 4px 14px; border-radius: 20px;
}
.pbtn-ar {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 13px 28px; border-radius: 30px;
  font-family: 'Outfit', sans-serif; font-size: .95rem; font-weight: 700;
  cursor: pointer; border: none;
  background: linear-gradient(135deg, #ff4d6d, #c0392b); color: #fff;
  box-shadow: 0 6px 24px rgba(255,77,109,.45); margin-bottom: 12px;
}
.portada-hint { font-size: .72rem; color: rgba(255,255,255,.45); margin-top: 6px; }

#btn-quiz-sala {
  display: none; position: fixed; bottom: 20px; right: 16px; z-index: 2000;
  padding: 11px 20px; border-radius: 22px;
  background: linear-gradient(135deg, #ff4d6d, #c0392b); color: #fff; border: none;
  font-family: 'Outfit', sans-serif; font-size: .85rem; font-weight: 700;
  cursor: pointer; box-shadow: 0 4px 20px rgba(255,77,109,.5);
}

#overlay { position: absolute; inset: 0; z-index: 1000; pointer-events: none; }

.portada-escolar {
  display: none; position: absolute; bottom: 22px; left: 50%;
  transform: translateX(-50%); padding: 22px 26px; border-radius: 22px;
  background: rgba(4,12,30,0.97); border: 2px solid #00e5ff; color: white;
  pointer-events: auto; max-width: 82%; box-shadow: 0 0 28px rgba(0,229,255,.25);
  text-align: center;
}
.portada-escolar .nome {
  font-family: 'Outfit', sans-serif; font-size: 1.3rem; font-weight: 900;
  margin: 8px 0 2px; color: #00e5ff; text-transform: uppercase; letter-spacing: .06em;
}
.portada-escolar .letras { font-size: .78rem; color: #88aacc; display: block; margin-bottom: 12px; }
.instrucions {
  font-size: .83rem; line-height: 1.55; background: rgba(0,229,255,.07);
  padding: 10px 14px; border-radius: 12px; color: #cce8ff;
}
.instrucions b { color: #00e5ff; }

#quiz-panel {
  display: none; position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%); z-index: 9999;
  background: rgba(4,10,28,0.99); border: 2px solid #00e5ff; border-radius: 22px;
  padding: 28px 22px 22px; width: 92%; max-width: 460px;
  color: white; pointer-events: auto; box-shadow: 0 0 60px rgba(0,229,255,.15);
}
#quiz-panel.activo { display: flex; flex-direction: column; }
.qx {
  position: absolute; top: 12px; right: 16px; background: rgba(255,255,255,.06);
  border: none; color: #888; font-size: 1.1rem; cursor: pointer;
  width: 30px; height: 30px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
}
.qx:hover { background: rgba(255,255,255,.12); color: #fff; }
.q-header { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 4px; }
.q-icona { font-size: 2rem; animation: pulso 2s ease-in-out infinite; }
@keyframes pulso { 0%,100%{transform:scale(1)} 50%{transform:scale(1.12)} }
.q-logo { font-family: 'Outfit', sans-serif; font-size: 1.4rem; font-weight: 900; color: #fff; }
.q-logo span { color: #ff4d6d; }
.q-sub { font-size: .74rem; color: #6688aa; text-align: center; margin-bottom: 18px; letter-spacing: .08em; text-transform: uppercase; }
.q-barra-c { width: 100%; height: 6px; background: rgba(255,255,255,.07); border-radius: 3px; margin-bottom: 20px; overflow: hidden; }
.q-barra { height: 100%; background: linear-gradient(90deg,#00e5ff,#ff4d6d); border-radius: 3px; transition: width .45s ease; }
.q-num { font-size: .72rem; color: #4488aa; font-weight: 600; text-align: center; margin-bottom: 8px; text-transform: uppercase; letter-spacing: .1em; }
.q-preg { font-family: 'Outfit', sans-serif; color: #fff; font-size: 1.05rem; font-weight: 700; text-align: center; line-height: 1.45; margin-bottom: 18px; }
.q-ops { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.opcion {
  padding: 14px 12px; border-radius: 14px; border: 2px solid rgba(0,229,255,.2);
  background: rgba(0,229,255,.04); color: #cce0f0; font-size: .88rem; font-weight: 600;
  cursor: pointer; text-align: center; transition: all .15s; font-family: 'Nunito', sans-serif;
}
.opcion:hover:not(:disabled) { border-color: #00e5ff; background: rgba(0,229,255,.12); color: #fff; transform: translateY(-2px); }
.opcion:disabled { cursor: default; transform: none; }
.opcion.correcta  { background: rgba(0,230,100,.15) !important; border-color: #00e664 !important; color: #00e664 !important; }
.opcion.incorrecta { background: rgba(255,77,109,.15) !important; border-color: #ff4d6d !important; color: #ff7a8a !important; }
.q-fb { min-height: 40px; margin-top: 14px; font-size: .88rem; text-align: center; font-weight: 700; color: #00e664; line-height: 1.45; font-family: 'Nunito', sans-serif; }
.q-fb.mal { color: #ff7a8a; }
.q-btn-seg {
  margin-top: 16px; display: none; padding: 12px 36px; border-radius: 26px;
  background: linear-gradient(135deg,#00e5ff,#00b8d9); color: #07090f;
  border: none; font-size: .92rem; font-weight: 800;
  cursor: pointer; font-family: 'Outfit', sans-serif; align-self: center;
}
#q-resultado { display: none; flex-direction: column; align-items: center; text-align: center; gap: 8px; }
.r-trofeo { font-size: 3rem; animation: pulso 1.5s infinite; }
.r-puntos { font-family: 'Outfit', sans-serif; font-size: 4.5rem; font-weight: 900; color: #00e5ff; line-height: 1; }
.r-label  { font-family: 'Outfit', sans-serif; font-size: 1.1rem; font-weight: 700; color: #fff; }
.r-stars  { font-size: 1.6rem; letter-spacing: 2px; }
.r-msg    { font-size: .88rem; color: #99bbcc; max-width: 340px; line-height: 1.55; margin: 0; }
.r-bots   { display: flex; gap: 10px; margin-top: 14px; flex-wrap: wrap; justify-content: center; }
.r-btn-rep { padding: 11px 28px; border-radius: 22px; background: linear-gradient(135deg,#ff4d6d,#c0392b); color: #fff; border: none; font-family: 'Outfit', sans-serif; font-size: .9rem; font-weight: 700; cursor: pointer; }
.r-btn-pec { padding: 11px 28px; border-radius: 22px; background: transparent; color: #6688aa; border: 2px solid rgba(255,255,255,.12); font-size: .9rem; cursor: pointer; font-family: 'Nunito', sans-serif; }
</style>
</head>
<body>

<div id="portada">
  <div id="portada-bg"></div>
  <div class="portada-inner">
    <div class="portada-divider"></div>
    <img class="portada-foto" src="imax/begonha2.png" alt="Begoña Caamaño">
    <h1 class="portada-nome">Begoña<br><span>Caamaño</span></h1>
    <span class="portada-data">Letras Galegas &middot; 2026</span><br>
   
    <button class="pbtn-ar" onclick="entrarAR()">&#128247; Entrar no museo AR</button>
    <p class="portada-hint">Preme e toca a pantalla para colocar a sala</p>
  </div>
</div>

<button id="btn-quiz-sala" onclick="abrirQuiz()">&#10067; Canto sabes?</button>

<div id="overlay">
  <div class="portada-escolar">
    <img src="imax/begonha2.png"
         style="width:64px;height:64px;border-radius:50%;border:2px solid #00e5ff;object-fit:cover;margin-bottom:8px;"
         alt="Begoña Caamaño">
    <div class="nome">BEGO&Ntilde;A CAAMA&Ntilde;O</div>
    <span class="letras">Letras Galegas 2026</span>
    <div class="instrucions">
      Toca a pantalla para <b>colocar a sala</b>.<br>
      Mira os paneis e <b>tócaos para ampliar</b>.
    </div>
  </div>

  <div id="quiz-panel">
    <button class="qx" onclick="pecharQuiz()">&#x2715;</button>
    <div id="q-xogo">
      <div class="q-header">
        <span class="q-icona">&#10067;</span>
        <div class="q-logo">Canto <span>sabes</span>?</div>
      </div>
      <div class="q-sub">Bego&ntilde;a Caama&ntilde;o &middot; Letras Galegas 2026</div>
      <div class="q-barra-c"><div class="q-barra" id="q-barra" style="width:0%"></div></div>
      <div class="q-num"  id="q-num"></div>
      <div class="q-preg" id="q-preg"></div>
      <div class="q-ops"  id="q-ops"></div>
      <div class="q-fb"   id="q-fb"></div>
      <button class="q-btn-seg" id="q-btn-seg" onclick="qSeguinte()">Seguinte &#8594;</button>
    </div>
    <div id="q-resultado">
      <div class="r-trofeo">&#127942;</div>
      <div class="r-puntos" id="r-puntos"></div>
      <div class="r-label"  id="r-label"></div>
      <div class="r-stars"  id="r-stars"></div>
      <p   class="r-msg"    id="r-msg"></p>
      <div class="r-bots">
        <button class="r-btn-rep" onclick="qReiniciar()">&#8635; Repetir</button>
        <button class="r-btn-pec" onclick="pecharQuiz()">Pechar</button>
      </div>
    </div>
  </div>
</div>

<a-scene renderer="colorManagement:true; antialias:true"
         webxr="optionalFeatures: hit-test, dom-overlay; overlayElement:#overlay">

  <a-assets>
    <img   id="img-bego"    src="imax/Begonha1.jpg">
    <img   id="img-circe"   src="imax/circe.jpg">
    <img   id="img-esmelle" src="imax/esmelle.jpg">
    <audio id="audio-file"  src="sons/begonhaaudio.mp3" preload="auto"></audio>
    <video id="video-file"  src="imax/begona.mp4" preload="auto" loop crossorigin="anonymous"></video>
    <img   id="icon-audio"  src="https://cdn-icons-png.flaticon.com/512/727/727269.png">
  </a-assets>

  <a-camera position="0 1.6 0">
    <a-entity cursor="fuse:false; rayOrigin:entity;" raycaster="objects:.area-clic"
              position="0 0 -1"
              geometry="primitive:ring; radiusInner:0.015; radiusOuter:0.02"
              material="color:#ff4d6d; shader:flat">
    </a-entity>
  </a-camera>

  <a-entity id="reticle" ar-hit-test="target:#museo"></a-entity>

  <a-entity id="museo" visible="false">

    <!-- ══════════════════════════════════════
         ① NORTE: BIOGRAFÍA
    ══════════════════════════════════════ -->
    <a-entity position="0 2.5 -9">

      <!-- Fondo máis alto (2.2) e texto desprazado para dar respiro -->
      <a-plane width="5.4" height="2.2" color="#080f20" opacity="0.97"
               position="0 1.2 0"></a-plane>
      <a-plane width="5.4" height="0.05" color="#ff4d6d" opacity="1"
               position="0 2.28 0.01"></a-plane>

      <a-text value="QUEN FOI BEGOÑA CAAMAÑO?"
              font="exo2bold" align="center" width="5.4"
              position="0 1.85 0.1" color="#ff4d6d" wrap-count="28"></a-text>
      <a-text value="Xornalista · Escritora · Activista feminista"
              align="center" width="4.6"
              position="0 1.45 0.1" color="#88aacc" wrap-count="40"></a-text>
      <a-text value="Redefiniu a narrativa galega dende o feminismo e a sororidade"
              align="center" width="4.4"
              position="0 0.95 0.1" color="#ddeeff" wrap-count="46"></a-text>

      <!-- Imaxe desplazada cara abaixo para non apertar o texto -->
      <a-image src="#img-bego" width="4.2" height="2.5"
               position="0 -0.9 0.05"></a-image>

      <a-plane class="area-clic" width="5.4" height="5.4" position="0 0.3 0.15"
               material="opacity:0; transparent:true" onclick="toggle('info1')"></a-plane>

      <!-- Desplegable -->
      <a-entity id="info1" visible="false" position="0 0.8 0.5">
        <a-plane width="5.2" height="3.4" color="#060d1e" opacity="0.98"></a-plane>
        <a-plane width="5.2" height="0.05" color="#ff4d6d" position="0 1.67 0.01"></a-plane>
        <a-text value="VIGO, 1964 — SANTIAGO, 2014" font="exo2bold" align="center" width="4.8" position="0 1.3 0.1" color="#ff4d6d" wrap-count="32"></a-text>
        <a-text value="Voz mítica da RADIO GALEGA durante décadas. Traballou como xornalista política e cultural, sempre comprometida coa lingua galega e cos dereitos das mulleres." align="center" width="4.4" position="0 0.55 0.1" color="#ddeeff" wrap-count="48"></a-text>
        <a-text value="Nas súas novelas, Circe e Morgana deixan de ser vilás para converterse en protagonistas donas do seu propio destino e da súa propia historia." align="center" width="4.4" position="0 -0.3 0.1" color="#aaccee" wrap-count="48"></a-text>
        <a-text value="★ Premio da Crítica Española  ★ Finalista Blanco Amor" font="exo2bold" align="center" width="4.8" position="0 -1.1 0.1" color="#ffb347" wrap-count="52"></a-text>
      </a-entity>
    </a-entity>

    <!-- ✨ NOVA: CITA FLOTANTE ESQUERDA (Biografía) ✨ -->
    <a-entity position="-4.8 1.8 -7" rotation="0 30 0">
      <a-plane width="3.6" height="1.4" color="#ff4d6d" opacity="0.08" material="shader:flat" position="0 0 0"></a-plane>
      <a-plane width="0.06" height="1.4" color="#ff4d6d" position="-1.77 0 0.01"></a-plane>
      <a-text value="« A muller dona do seu desexo\ne do seu propio corpo »"
              font="exo2semibold" align="center" width="3.2" position="0 0.25 0.05" color="#fff" wrap-count="24"></a-text>
      <a-text value="— Circe ou o pracer do azul"
              align="right" width="2.4" position="1.1 -0.45 0.05" color="#ffb6c1" wrap-count="30"></a-text>
    </a-entity>


    <!-- ══════════════════════════════════════
         ② SUR: OBRAS
    ══════════════════════════════════════ -->
    <a-entity position="0 2.5 9" rotation="0 180 0">

      <a-plane width="5.4" height="2.2" color="#080f20" opacity="0.97" position="0 1.2 0"></a-plane>
      <a-plane width="5.4" height="0.05" color="#ffb6c1" position="0 2.28 0.01"></a-plane>

      <a-text value="OBRAS FUNDAMENTAIS"
              font="exo2bold" align="center" width="5.4"
              position="0 1.85 0.1" color="#ffb6c1" wrap-count="26"></a-text>
      <a-text value="A reescritura feminista dos mitos clásicos e artúricos"
              align="center" width="4.6"
              position="0 1.45 0.1" color="#88aacc" wrap-count="44"></a-text>
      <a-text value="Toca para coñecer as súas novelas"
              align="center" width="4"
              position="0 0.95 0.1" color="#557799" wrap-count="44"></a-text>

      <!-- Imaxes e títulos con espazo -->
      <a-image src="#img-circe"   width="1.8" height="2.6" position="-1.2 -0.9 0.05"></a-image>
      <a-image src="#img-esmelle" width="1.8" height="2.6" position="1.2  -0.9 0.05"></a-image>
      <a-text value="Circe (2009)"   align="center" width="3" position="-1.2 -2.4 0.1" color="#ff9aaa" wrap-count="20"></a-text>
      <a-text value="Morgana (2012)" align="center" width="3" position="1.2  -2.4 0.1" color="#ff9aaa" wrap-count="20"></a-text>

      <a-plane class="area-clic" width="5.4" height="6" position="0 -0.4 0.15"
               material="opacity:0; transparent:true" onclick="toggle('info3')"></a-plane>

      <a-entity id="info3" visible="false" position="0 0.8 0.5">
        <a-plane width="5.2" height="3.6" color="#060d1e" opacity="0.98"></a-plane>
        <a-plane width="5.2" height="0.05" color="#ffb6c1" position="0 1.77 0.01"></a-plane>
        <a-text value="CIRCE OU O PRACER DO AZUL · 2009" font="exo2bold" align="center" width="4.8" position="0 1.38 0.1" color="#ffb6c1" wrap-count="34"></a-text>
        <a-text value="Circe non é a bruxa que transforma homes en porcos. É unha muller que descobre o seu propio desexo e reclama a súa liberdade. Finalista do Premio Blanco Amor." align="center" width="4.4" position="0 0.65 0.1" color="#ddeeff" wrap-count="48"></a-text>
        <a-text value="MORGANA EN ESMELLE · 2012" font="exo2bold" align="center" width="4.8" position="0 -0.1 0.1" color="#ffb6c1" wrap-count="34"></a-text>
        <a-text value="Morgana convértese nunha muller chea de culpa e tenrura nunha Galicia contemporánea. Premio da Crítica Española. Obra mestra da literatura galega do século XXI." align="center" width="4.4" position="0 -0.85 0.1" color="#aaccee" wrap-count="48"></a-text>
      </a-entity>
    </a-entity>

    <!-- ✨ NOVA: CITA FLOTANTE DEREITA (Obras) ✨ -->
    <a-entity position="4.8 1.8 7" rotation="0 -150 0">
      <a-plane width="4.0" height="1.4" color="#00e5ff" opacity="0.08" material="shader:flat" position="0 0 0"></a-plane>
      <a-plane width="0.06" height="1.4" color="#00e5ff" position="-1.97 0 0.01"></a-plane>
      <a-text value="« A sororidade como a única arma\npara vencer a culpa »"
              font="exo2semibold" align="center" width="3.6" position="0 0.25 0.05" color="#fff" wrap-count="28"></a-text>
      <a-text value="— Morgana en Esmelle"
              align="right" width="2.5" position="1.3 -0.45 0.05" color="#cce8ff" wrap-count="30"></a-text>
    </a-entity>


    <!-- ══════════════════════════════════════
         ③ OESTE: AUDIO
    ══════════════════════════════════════ -->
    <a-entity position="-9 2.2 0" rotation="0 90 0">
      <a-plane width="4.6" height="4.6" color="#080f20" opacity="0.95"></a-plane>
      <a-plane width="4.6" height="0.05" color="#00e5ff" position="0 2.27 0.01"></a-plane>

      <a-ring radius-inner="1.1" radius-outer="1.25" color="#00e5ff" position="0 0.45 0.04" material="opacity:0.3; shader:flat"></a-ring>
      <a-ring radius-inner="0.72" radius-outer="0.78" color="#00e5ff" position="0 0.45 0.05" material="opacity:0.55; shader:flat"></a-ring>
      <a-image src="#icon-audio" width="0.9" height="0.9" position="0 0.45 0.1"></a-image>

      <a-text value="A VOZ DA AUTORA"
              font="exo2bold" align="center" width="5.5"
              position="0 -0.8 0.1" color="#00e5ff" wrap-count="20"></a-text>
      <a-text value="Escoita a Begoña Caamaño"
              align="center" width="4.2"
              position="0 -1.3 0.1" color="#88aacc" wrap-count="30"></a-text>
      <a-text value="[ TOCA PARA REPRODUCIR ]"
              align="center" width="3.8"
              position="0 -1.75 0.1" color="#336677" wrap-count="28"></a-text>

      <a-plane class="area-clic" width="4.6" height="4.6" position="0 0 0.12"
               material="opacity:0; transparent:true" onclick="toggleAudio()"></a-plane>
      <a-entity id="sound-emitter" sound="src:#audio-file; volume:3"></a-entity>
    </a-entity>


    <!-- ══════════════════════════════════════
         ④ LESTE: VÍDEO
    ══════════════════════════════════════ -->
    <a-entity position="9 2.2 0" rotation="0 -90 0">
      <a-plane width="5.4" height="1.6" color="#080f20" opacity="0.97" position="0 1.7 0"></a-plane>
      <a-plane width="5.4" height="0.05" color="#00e5ff" position="0 2.47 0.01"></a-plane>

      <a-text value="XORNALISMO POLÍTICO"
              font="exo2bold" align="center" width="5.5"
              position="0 2.05 0.1" color="#00e5ff" wrap-count="24"></a-text>
      <a-text value="Begoña Caamaño na Radio Galega"
              align="center" width="4.8"
              position="0 1.5 0.1" color="#88aacc" wrap-count="40"></a-text>

      <a-video src="#video-file" width="4.6" height="2.58" position="0 -0.1 0.05"></a-video>

      <a-plane width="4.6" height="0.6" color="#030a18" opacity="0.95" position="0 -1.6 0.1"></a-plane>
      <a-text value="▶  CLICA NO VÍDEO PARA REPRODUCIR"
              align="center" width="5.2"
              position="0 -1.6 0.15" color="#00e5ff" wrap-count="36"></a-text>

      <a-plane class="area-clic" width="4.6" height="2.58" position="0 -0.1 0.2"
               material="opacity:0; transparent:true" onclick="toggleVideo()"></a-plane>
    </a-entity>


    <!-- ══════════════════════════════════════
         ⑤ NORESTE: QUIZ
    ══════════════════════════════════════ -->
    <a-entity position="6 2.2 -6" rotation="0 -45 0">
      <a-plane width="4.1" height="3.7" color="#00e5ff" opacity="0.07" position="0 0 -0.02"></a-plane>
      <a-plane width="3.9" height="3.5" color="#080f20" opacity="0.97" position="0 0 0"></a-plane>
      <a-plane width="3.9" height="0.05" color="#ff4d6d" position="0 1.72 0.01"></a-plane>

      <a-text value="?"
              font="exo2bold" align="center" width="8"
              position="0 0.8 0.1" color="#ff4d6d" wrap-count="2"></a-text>
      <a-text value="CANTO SABES?"
              font="exo2bold" align="center" width="4.8"
              position="0 -0.2 0.1" color="#ffffff" wrap-count="16"></a-text>
      <a-text value="Pon a proba os teus coñecementos"
              align="center" width="3.6"
              position="0 -0.7 0.1" color="#88aacc" wrap-count="30"></a-text>

      <a-plane width="3.1" height="0.6" color="#ff4d6d" opacity="0.92" position="0 -1.4 0.1"></a-plane>
      <a-text value="★  INICIAR QUIZ  ★"
              font="exo2bold" align="center" width="4.2"
              position="0 -1.4 0.15" color="#fff" wrap-count="18"></a-text>

      <a-plane class="area-clic" width="3.9" height="3.5" position="0 0 0.2"
               material="opacity:0; transparent:true" onclick="abrirQuiz()"></a-plane>

  </a-entity><!-- fin #museo -->

<script>
const scene       = document.querySelector('a-scene');
const museo       = document.querySelector('#museo');
const reticle     = document.querySelector('#reticle');
const portadaEl   = document.getElementById('portada');
const btnQuizSala = document.getElementById('btn-quiz-sala');

function toggle(id) {
  const el = document.getElementById(id);
  el.setAttribute('visible', !el.getAttribute('visible'));
}
function toggleAudio() {
  const s = document.querySelector('#sound-emitter');
  if (!s?.components?.sound) return;
  s.components.sound.isPlaying
    ? s.components.sound.stopSound()
    : s.components.sound.playSound();
}
function toggleVideo() {
  const v = document.querySelector('#video-file');
  if (!v) return;
  v.paused ? v.play().catch(()=>{}) : v.pause();
}
function entrarAR() {
  portadaEl.style.display = 'none';
  document.querySelector('.portada-escolar').style.display = 'block';
  const aBtn = document.querySelector('.a-enter-vr-button');
  if (aBtn) aBtn.click();
}
window.addEventListener('click', (e) => {
  if (e.target.closest('#quiz-panel')) return;
  if (document.getElementById('quiz-panel').classList.contains('activo')) return;
  if (scene.is('ar-mode') && reticle.getAttribute('visible')) {
    museo.setAttribute('position', reticle.getAttribute('position'));
    museo.setAttribute('visible', true);
    reticle.setAttribute('visible', false);
    document.querySelector('.portada-escolar').style.display = 'none';
    btnQuizSala.style.display = 'block';
  }
});
scene.addEventListener('enter-vr', () => {
  portadaEl.style.display = 'none';
  if (!scene.is('ar-mode')) {
    museo.setAttribute('visible', true);
    btnQuizSala.style.display = 'block';
  }
});
scene.addEventListener('exit-vr', () => { btnQuizSala.style.display = 'block'; });

/* ══ QUIZ ══ */
const QP = [
  { p:"En que cidade naceu Begoña Caamaño?", ops:["Vigo","Santiago de Compostela","A Coruña","Pontevedra"], ok:0, exp:"Naceu en Vigo no ano 1964." },
  { p:"En que medio traballou como xornalista?", ops:["TVG","Radio Galega","La Voz de Galicia","El Correo Gallego"], ok:1, exp:"Foi unha voz fundamental na Radio Galega." },
  { p:"En que ano faleceu Begoña Caamaño?", ops:["2010","2012","2014","2016"], ok:2, exp:"Faleceu en Santiago de Compostela en 2014." },
  { p:"Cal é o título da súa novela de 2009?", ops:["Morgana en Esmelle","Circe ou o pracer do azul","A illa das mulleres","O libro das fadas"], ok:1, exp:"'Circe ou o pracer do azul' publicouse en 2009." },
  { p:"En que ano se publicou 'Morgana en Esmelle'?", ops:["2008","2010","2012","2014"], ok:2, exp:"'Morgana en Esmelle' publicouse en 2012." },
  { p:"Que temática atravesa a obra de Begoña Caamaño?", ops:["A guerra civil española","O feminismo e a reescritura de mitos","A emigración galega","A vida rural no século XIX"], ok:1, exp:"O feminismo e a revisión dos mitos son o núcleo da súa obra." },
  { p:"A que ano das Letras Galegas corresponde a súa homenaxe?", ops:["2024","2025","2026","2027"], ok:2, exp:"O Día das Letras Galegas 2026 está dedicado a Begoña Caamaño." }
];
let qIdx=0, qPts=0, qResp=false;

function abrirQuiz(){
  /* 🛑 O quiz está xa aberto? Ignoramos o clic para que non se reabra / reinicie */
  if (document.getElementById('quiz-panel').classList.contains('activo')) return; 

  qIdx=0; qPts=0; qResp=false;
  document.getElementById('quiz-panel').classList.add('activo');
  document.getElementById('q-resultado').style.display='none';
  document.getElementById('q-xogo').style.display='block';
  qMostrar();
}
function pecharQuiz(){ document.getElementById('quiz-panel').classList.remove('activo'); }
function qReiniciar(){
  qIdx=0; qPts=0; qResp=false;
  document.getElementById('q-resultado').style.display='none';
  document.getElementById('q-xogo').style.display='block';
  qMostrar();
}
function qMostrar(){
  qResp=false;
  const q=QP[qIdx], tot=QP.length;
  document.getElementById('q-barra').style.width=(qIdx/tot*100)+'%';
  document.getElementById('q-num').textContent='Pregunta '+(qIdx+1)+' de '+tot;
  document.getElementById('q-preg').textContent=q.p;
  document.getElementById('q-fb').textContent='';
  document.getElementById('q-fb').className='q-fb';
  document.getElementById('q-btn-seg').style.display='none';
  const ops=document.getElementById('q-ops');
  ops.innerHTML='';
  q.ops.forEach((o,i)=>{
    const b=document.createElement('button');
    b.className='opcion'; b.textContent=o;
    b.onclick=()=>qResponder(i);
    ops.appendChild(b);
  });
}
function qResponder(idx){
  if(qResp) return; qResp=true;
  const q=QP[qIdx];
  const bts=document.querySelectorAll('.opcion');
  bts.forEach(b=>b.disabled=true);
  const fb=document.getElementById('q-fb');
  if(idx===q.ok){ qPts++; bts[idx].classList.add('correcta'); fb.textContent='✓ Correcto!  '+q.exp; }
  else { bts[idx].classList.add('incorrecta'); bts[q.ok].classList.add('correcta'); fb.textContent='✗ Incorrecto.  '+q.exp; fb.className='q-fb mal'; }
  const bs=document.getElementById('q-btn-seg');
  bs.style.display='inline-block';
  bs.textContent=qIdx>=QP.length-1?'Ver resultado ✦':'Seguinte →';
}
function qSeguinte(){ qIdx++; qIdx>=QP.length?qResultado():qMostrar(); }
function qResultado(){
  document.getElementById('q-xogo').style.display='none';
  document.getElementById('q-barra').style.width='100%';
  document.getElementById('q-resultado').style.display='flex';
  const tot=QP.length, pct=Math.round(qPts/tot*100);
  document.getElementById('r-puntos').textContent=qPts+'/'+tot;
  let lb,mg,st;
  if(pct===100){lb='Excelente!';st='★★★★★';mg='Dominas o legado de Begoña Caamaño. Parabéns!';}
  else if(pct>=71){lb='Moi ben!';st='★★★★☆';mg='Coñeces ben a vida e a obra desta escritora fundamental.';}
  else if(pct>=43){lb='Vai ben!';st='★★★☆☆';mg='Tes boa base. Explora os paneis do museo para completar.';}
  else{lb='Segue aprendendo!';st='★★☆☆☆';mg='Revisa os paneis da sala e volve tentar. Begoña mérece!';}
  document.getElementById('r-label').textContent=lb;
  document.getElementById('r-stars').textContent=st;
  document.getElementById('r-msg').textContent=mg;
}
</script>
</body>
</html>
