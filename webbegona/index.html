<!DOCTYPE html>
<html lang="gl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<style>
  #overlay {
    position: absolute; bottom: 20px; width: 100%; text-align: center;
    z-index: 1000; font-family: 'Segoe UI', sans-serif; pointer-events: none;
  }
  .portada-escolar {
    display: inline-block; padding: 20px; border-radius: 20px;
    background: rgba(10, 15, 25, 0.95); border: 3px solid #ff4d6d;
    color: white; pointer-events: auto;
  }
</style>
</head>
<body>

<div id="overlay">
  <div class="portada-escolar">
    <h1 style="margin:0; font-size:1.3rem; color:#ff4d6d">BEGOÑA CAAMAÑO 2026</h1>
    <p style="font-size:0.85rem">Interactúa coa mostra na pantalla</p>
  </div>
</div>

<a-scene renderer="colorManagement:true; antialias:true" 
         webxr="optionalFeatures: hit-test, dom-overlay; overlayElement:#overlay">

  <a-assets>
    <!-- Imaxes do teu repositorio -->
    <img id="img-bego" src="imax/begonha1.jpg">
    <img id="img-circe" src="imax/circe.jpg">
    <img id="img-esmelle" src="imax/esmelle.jpg">
    
    <!-- Audio e Vídeo do teu repositorio -->
    <audio id="audio-file" src="sons/begonhaaudio.mp3" preload="auto"></audio>
    <video id="video-file" src="imax/begona.mp4" preload="auto" loop="true" crossorigin="anonymous"></video>
    
    <!-- Icona de audio estándar -->
    <img id="icon-audio" src="https://cdn-icons-png.flaticon.com/512/727/727269.png">
  </a-assets>

  <a-camera position="0 1.6 0">
    <a-entity cursor="fuse: false; rayOrigin: entity;" 
              raycaster="objects: .area-clic" 
              position="0 0 -1" 
              geometry="primitive: ring; radiusInner: 0.015; radiusOuter: 0.02" 
              material="color: #00e5ff; shader: flat"></a-entity>
  </a-camera>

  <a-entity id="reticle" ar-hit-test="target:#museo"></a-entity>

  <a-entity id="museo" visible="false">

    <!-- 1. QUEN FOI A HOMENAXEADA? (Norte) -->
    <a-entity position="0 2.2 -6">
      <a-plane width="5" height="3" color="#0f172a" opacity="0.9">
        <a-text value="QUEN FOI A HOMENAXEADA?" align="center" width="6" position="0 1.2 0.1" color="#ff4d6d" font="mozillavr"></a-text>
      </a-plane>
      <a-image src="#img-bego" width="4" height="2.8" position="0 -1.2 0.1"></a-image>
      <a-plane class="area-clic" width="6" height="6" position="0 -0.5 0.3" material="opacity: 0; transparent: true" onclick="toggle('info1')"></a-plane>
      <a-entity id="info1" visible="false" position="0 -0.5 0.5">
        <a-plane width="4.5" height="1.8" color="white"></a-plane>
        <a-text value="Begoña Caamaño (1964-2014): xornalista, escritora e activista feminista galega. Unha voz libre e imprescindible." align="center" width="4" color="#111" font="mozillavr" position="0 0 0.01"></a-text>
      </a-entity>
    </a-entity>

    <!-- 2. A QUE SE DEDICOU? + VIDEO (Leste) -->
    <a-entity position="5.5 2.2 -1.5" rotation="0 -70 0">
      <a-plane width="5" height="3" color="#0f172a" opacity="0.9">
        <a-text value="A QUE SE DEDICOU?" align="center" width="6" position="0 1.2 0.1" color="#00e5ff" font="mozillavr"></a-text>
      </a-plane>
      <!-- Pantalla de vídeo -->
      <a-video src="#video-file" width="4" height="2.25" position="0 -1.2 0.1"></a-video>
      <a-plane class="area-clic" width="5" height="4" position="0 -1 0.2" material="opacity: 0; transparent: true" onclick="toggleVideo()"></a-plane>
      <a-text value="(Toca o video para Play/Pausa)" align="center" width="3" position="0 -2.5 0.1" color="#00e5ff"></a-text>
    </a-entity>

    <!-- 3. CALES FORON AS OBRAS MAIS IMPORTANTES? (Sur-Leste) -->
    <a-entity position="3.5 2.2 5" rotation="0 -144 0">
      <a-plane width="5" height="3" color="#0f172a" opacity="0.9">
        <a-text value="AS OBRAS MAIS IMPORTANTES" align="center" width="6" position="0 1 0.1" color="#ffb6c1" font="mozillavr"></a-text>
      </a-plane>
      <a-image src="#img-circe" width="2" height="3" position="-1.1 -1.2 0.1"></a-image>
      <a-image src="#img-esmelle" width="2" height="3" position="1.1 -1.2 0.1"></a-image>
      <a-plane class="area-clic" width="6" height="6" position="0 -0.5 0.3" material="opacity: 0; transparent: true" onclick="toggle('info3')"></a-plane>
      <a-entity id="info3" visible="false" position="0 -1 0.5">
        <a-plane width="4.5" height="1.2" color="white"></a-plane>
        <a-text value="'Circe ou o pracer do azul' e 'Morgana en Esmelle'. A reescritura dos mitos." align="center" width="4" color="#111" font="mozillavr"></a-text>
      </a-entity>
    </a-entity>

    <!-- 4. ICONA DE AUDIO: ESCOITA A SÚA VOZ (Oeste) -->
    <a-entity position="-5.5 2 -1.5" rotation="0 70 0">
      <a-circle radius="1"  opacity="0.9">
        <a-image src="#icon-audio" width="0.8" height="0.8" position="0 0.2 0.1"></a-image>
        <a-text value="ESCOITA A&#10;SUA VOZ" align="center" width="5" position="0 -0.4 0.1" font="mozillavr"></a-text>
      </a-circle>
      <a-plane class="area-clic" width="2" height="2" position="0 0 0.2" material="opacity: 0; transparent: true" onclick="toggleAudio()"></a-plane>
      <a-entity id="sound-emitter" sound="src: #audio-file; volume: 2"></a-entity>
    </a-entity>

    <!-- 5. QUERES SABER MÁIS? (Sur - Afastado) -->
    <a-entity position="0 1.5 10" rotation="0 180 0">
      <a-plane width="5" height="2.5" color="#0f172a" opacity="0.8">
        <a-text value="QUERES SABER MAIS?" align="center" width="6" position="0 0.8 0.1" color="#00e5ff" font="mozillavr"></a-text>
        <a-entity position="0 -0.2 0.1">
          <a-plane class="area-clic" width="4" height="0.7" color="#444" onclick="window.open('https://gl.wikipedia.org/wiki/Begoña_Caamaño','_blank')"></a-plane>
          <a-text value="LER BIOGRAFIA COMPLETA" align="center" width="3.5" position="0 0 0.05"></a-text>
        </a-entity>
      </a-plane>
    </a-entity>

  </a-entity>
</a-scene>

<script>
function toggle(id) {
  const el = document.getElementById(id);
  el.setAttribute('visible', !el.getAttribute('visible'));
}

function toggleAudio() {
  const sound = document.querySelector('#sound-emitter');
  const isPlaying = sound.components.sound.isPlaying;
  if (isPlaying) { sound.components.sound.stopSound(); } 
  else { sound.components.sound.playSound(); }
}

function toggleVideo() {
  const v = document.querySelector('#video-file');
  if (v.paused) { v.play(); } 
  else { v.pause(); }
}

const scene = document.querySelector('a-scene');
const museo = document.querySelector('#museo');
const reticle = document.querySelector('#reticle');

window.addEventListener('click', () => {
  if(scene.is('ar-mode') && reticle.getAttribute('visible')){
    museo.setAttribute('position', reticle.getAttribute('position'));
    museo.setAttribute('visible', true);
    reticle.setAttribute('visible', false);
    document.querySelector('.portada-escolar').style.display = 'none';
  }
});
</script>
</body>
</html>
