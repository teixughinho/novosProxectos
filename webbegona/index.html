<!DOCTYPE html>
<html lang="gl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

  <style>
/* 
  ========================================
  ESTILOS ACTUALIZADOS: MUSEO BEGOÑA CAAMAÑO 2026
  ========================================
*/

:root {
  --primary: #ff4d6d;
  --primary-glow: rgba(255, 77, 109, 0.4);
  --secondary: #00e5ff;
  --secondary-glow: rgba(0, 229, 255, 0.3);
  --bg-dark: #050811;
  --glass-bg: rgba(6, 13, 28, 0.82);
  --text-main: #e6f0fb;
  --text-muted: #8db8d8;
  --font-header: 'Outfit', sans-serif;
  --font-body: 'Nunito', sans-serif;
}

*, *::before, *::after { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

html, body { 
  width: 100%; height: 100%; 
  margin: 0; padding: 0;
  background-color: var(--bg-dark);
  color: var(--text-main);
  font-family: var(--font-body);
  overflow: hidden;
}

/* FONDO GRADIENTE DINÁMICO */
body {
  background: 
    radial-gradient(circle at 50% -20%, rgba(0, 229, 255, 0.12), transparent 45%),
    linear-gradient(180deg, #07101e 0%, #050811 100%);
}

/* --- PORTADA PRINCIPAL --- */
#portada {
  position: fixed; inset: 0; z-index: 9999;
  display: flex; align-items: center; justify-content: center;
  transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1);
}

#portada-bg {
  position: absolute; inset: 0;
  opacity: 0;
  background: url('imax/begonha2.png') center top / cover no-repeat;
  filter: brightness(0.25) saturate(0.6) blur(2px);
  transition: opacity 0.8s ease;
}
#portada-bg.lista { opacity: 1; }

.portada-inner {
  position: relative; z-index: 1;
  text-align: center; 
  padding: 40px 30px;
  max-width: 440px; width: 90%;
  background: var(--glass-bg);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid rgba(255, 255, 255, 0.08);
  border-radius: 32px;
  box-shadow: 
    0 25px 50px -12px rgba(0, 0, 0, 0.6),
    0 0 40px rgba(0, 229, 255, 0.05);
}

.portada-kicker {
  display: inline-block;
  margin-bottom: 16px;
  padding: 6px 14px;
  border-radius: 999px;
  font-family: var(--font-header);
  font-size: 0.7rem; font-weight: 700;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--secondary);
  background: rgba(0, 229, 255, 0.1);
  border: 1px solid rgba(0, 229, 255, 0.2);
}

.portada-foto {
  width: 110px; height: 110px; border-radius: 50%;
  border: 3px solid var(--primary);
  object-fit: cover; object-position: top;
  box-shadow: 0 0 25px var(--primary-glow);
  margin: 0 auto 20px; display: block;
}

.portada-nome {
  margin: 0;
  font-family: var(--font-header);
  font-size: 2.4rem; font-weight: 900;
  line-height: 0.95; letter-spacing: -0.02em;
  text-transform: uppercase;
}
.portada-nome span { color: var(--primary); }

.portada-sub {
  margin: 18px auto 0;
  font-size: 1rem; line-height: 1.5;
  color: var(--text-muted);
}

.portada-data {
  display: inline-block; margin: 20px 0;
  font-family: var(--font-header);
  font-size: 0.75rem; font-weight: 600;
  letter-spacing: 0.15em; color: var(--primary);
  opacity: 0.9;
}

.pbtn-ar {
  width: 100%;
  padding: 16px 24px; border-radius: 18px;
  font-family: var(--font-header); font-size: 1rem; font-weight: 800;
  cursor: pointer; border: none;
  background: linear-gradient(135deg, var(--primary), #b02a37);
  color: #fff;
  transition: transform 0.2s, box-shadow 0.2s;
  box-shadow: 0 10px 20px rgba(255, 77, 109, 0.3);
}
.pbtn-ar:active { transform: scale(0.97); }

/* --- BOTÓN QUIZ (FLOTANTE) --- */
#btn-quiz-sala {
  display: none; position: fixed; bottom: 25px; right: 20px; z-index: 2000;
  padding: 12px 24px; border-radius: 50px;
  background: var(--glass-bg);
  color: #fff; border: 1.5px solid var(--primary);
  font-family: var(--font-header); font-size: 0.85rem; font-weight: 700;
  cursor: pointer; backdrop-filter: blur(8px);
  box-shadow: 0 8px 16px rgba(0,0,0,0.3);
}

/* --- PANEL DE QUIZ --- */
#quiz-panel {
  display: none; position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  z-index: 10000;
  background: rgba(4, 8, 20, 0.98);
  border: 1px solid var(--secondary);
  border-radius: 28px;
  padding: 30px 25px; width: 92%; max-width: 480px;
  box-shadow: 0 0 50px rgba(0, 229, 255, 0.15);
}
#quiz-panel.activo { display: flex; flex-direction: column; }

.q-barra-c {
  width: 100%; height: 4px;
  background: rgba(255,255,255,0.1); border-radius: 10px;
  margin: 20px 0; overflow: hidden;
}
.q-barra {
  height: 100%; background: var(--secondary);
  box-shadow: 0 0 10px var(--secondary-glow);
  transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}

.opcion {
  padding: 15px; margin-bottom: 10px; border-radius: 16px;
  border: 1px solid rgba(255,255,255,0.1);
  background: rgba(255,255,255,0.03);
  color: var(--text-main); font-weight: 600;
  transition: all 0.2s; text-align: left;
}
.opcion:hover:not(:disabled) {
  background: rgba(0, 229, 255, 0.08);
  border-color: var(--secondary);
}
.opcion.correcta { 
  background: rgba(0, 230, 100, 0.15) !important;
  border-color: #00e664 !important; color: #00e664 !important; 
}
.opcion.incorrecta { 
  background: rgba(255, 77, 109, 0.15) !important;
  border-color: var(--primary) !important; color: #ff8ca1 !important; 
}

/* --- TOOLTIP ESCOLAR --- */
.portada-escolar {
  display: none; position: absolute; bottom: 30px; left: 50%;
  transform: translateX(-50%);
  padding: 20px; border-radius: 24px;
  background: rgba(7, 16, 31, 0.95);
  border: 1px solid var(--secondary);
  text-align: center; width: 85%; max-width: 350px;
}

/* --- ANIMACIÓNS --- */
@keyframes glitch-view {
  0% { transform: translate(0); }
  20% { transform: translate(-2px, 2px); }
  40% { transform: translate(-2px, -2px); }
  60% { transform: translate(2px, 2px); }
  80% { transform: translate(2px, -2px); }
  100% { transform: translate(0); }
}

/* Optimización para dispositivos móbiles sen AR */
@media (max-width: 600px) {
  .portada-nome { font-size: 2rem; }
  .portada-inner { padding: 30px 20px; }
}
</style>
</head>
<body>

<!-- ══ PORTADA ══ -->
<div id="portada">
  <div id="portada-bg"></div>
  <div class="portada-inner">
    <div class="portada-divider"></div>
    <img class="portada-foto" src="imax/begonha2.png" alt="Begoña Caamaño">
    <h1 class="portada-nome">Begoña<br><span>Caamaño</span></h1>
    <span class="portada-data">Letras Galegas &middot; 2026</span>
    <div class="portada-botoes">
      <!-- entrarAR() oculta a portada e activa WebXR -->
<!--       <button class="pbtn pbtn-ar" onclick="entrarAR()">&#128247; Entrar en AR</button> -->
    </div>
<!--     <button class="pbtn-quiz" onclick="abrirQuiz()">&#127942; Canto sabes de Bego&ntilde;a Caamaño?</button> -->
    <span style="font-size:.75rem; opacity:.7; margin-top:10px; display:block;">Preme [AR] e toca a pantalla para colocar a sala</span>
  </div>
</div>

<!-- Botón quiz flotante na sala non-AR -->
<!-- <button id="btn-quiz-sala" onclick="abrirQuiz()">&#127942; Canto sabes?</button> -->

<!--
  OVERLAY DE AR (overlayElement:#overlay)
  Todo o que se ve en AR debe estar AQUÍ DENTRO.
  .portada-escolar: instrucións ao entrar en AR.
  #quiz-panel: o quiz, fillo directo de #overlay (NON dentro de .portada-escolar).
-->
<div id="overlay">

  <!-- Instrucións AR: aparece ao entrar en modo AR -->
  <div class="portada-escolar">
    <img src="imax/begonha2.png" style="width:70px;height:70px;border-radius:50%;border:2px solid #00e5ff;margin-bottom:10px;object-fit:cover;" alt="Begoña Caamaño">
    <h1 class="nome">BEGO&Ntilde;A CAAMA&Ntilde;O</h1>
    <span class="letras">Letras Galegas 2026</span>
    <div class="instrucions">
      Toca a pantalla para <b>colocar a sala</b>.<br>
      Interact&uacute;a cos paneis tocándoos.
    </div>
  </div>

  <!-- QUIZ: fillo directo de #overlay, centrado na pantalla -->
  <div id="quiz-panel">
    <button class="qx" onclick="pecharQuiz()">&#x2715;</button>
    <div id="q-xogo">
      <div class="q-logo">&#127942; Canto sabes?</div>
      <div class="q-sub">Bego&ntilde;a Caama&ntilde;o &middot; Letras Galegas 2026</div>
      <div class="q-barra-c"><div class="q-barra" id="q-barra" style="width:0%"></div></div>
      <div class="q-preg" id="q-preg"></div>
      <div class="q-ops"  id="q-ops"></div>
      <div class="q-fb"   id="q-fb"></div>
      <button class="q-btn-seg" id="q-btn-seg" onclick="qSeguinte()">Seguinte &#8594;</button>
    </div>
    <div id="q-resultado">
      <div class="r-puntos" id="r-puntos"></div>
      <div class="r-label"  id="r-label"></div>
      <div class="r-stars"  id="r-stars"></div>
      <p   class="r-msg"    id="r-msg"></p>
      <div class="r-bots">
        <button class="r-btn-rep" onclick="qReiniciar()">&#8635; Repetir</button>
        <button class="r-btn-pec" onclick="pecharQuiz()">Pechar</button>
      </div>
    </div>
  </div>

</div><!-- fin #overlay -->

<!-- ══ ESCENA A-FRAME ══ -->
<!-- overlayElement:#overlay — CORRECTO, nunca #quiz-panel -->
<a-scene renderer="colorManagement:true; antialias:true"
         webxr="optionalFeatures: hit-test, dom-overlay; overlayElement:#overlay">

  <a-assets>
    <img   id="img-bego"    src="imax/Begonha1.jpg">
    <img   id="img-circe"   src="imax/circe.jpg">
    <img   id="img-esmelle" src="imax/esmelle.jpg">
    <audio id="audio-file"  src="sons/begonhaaudio.mp3" preload="auto"></audio>
    <video id="video-file"  src="imax/begona.mp4" preload="auto" loop crossorigin="anonymous"></video>
    <img   id="icon-audio"  src="https://cdn-icons-png.flaticon.com/512/727/727269.png">
  </a-assets>

  <a-camera position="0 1.6 0">
    <a-entity
      cursor="fuse:false; rayOrigin:entity;"
      raycaster="objects:.area-clic"
      position="0 0 -1"
      geometry="primitive:ring; radiusInner:0.015; radiusOuter:0.02"
      material="color:#ff4d6d; shader:flat">
    </a-entity>
  </a-camera>

  <a-entity id="reticle" ar-hit-test="target:#museo"></a-entity>

  <a-entity id="museo" visible="false">

    <!-- ① NORTE: Quen foi Begoña Caamaño? -->
    <a-entity position="0 2.5 -9">
      <a-plane width="4.5" height="2.2" color="#0f172a" opacity="0.95" position="0 0.8 0">
        <a-text value="QUEN FOI BEGOÑA CAAMAÑO?" align="center" width="5" position="0 0.7 0.02" color="#ff4d6d"></a-text>
        <a-text value="Xornalista e activista que redefiniu a narrativa&#10;galega dende o feminismo e a sororidade." align="center" width="3.8" position="0 0.1 0.02"></a-text>
      </a-plane>
      <a-image src="#img-bego" width="3.8" height="2.2" position="0 -0.6 0.1"></a-image>
      <a-plane class="area-clic" width="4.5" height="4.5" position="0 0 0.15"
               material="opacity:0; transparent:true" onclick="toggle('info1')"></a-plane>
      <a-entity id="info1" visible="false" position="0 0.2 0.3">
        <a-plane width="4.2" height="2.4" color="#222" opacity="0.8"></a-plane>
        <a-text value="Vigo (1964) - Santiago (2014). Foi unha voz fundamental na Radio Galega e unha activista incansable. Nas súas novelas, deu voz a mulleres silenciadas pola mitoloxía clásica." align="center" width="3.8" color="white" position="0 0 0.05"></a-text>
      </a-entity>
    </a-entity>

    <!-- ② SUR: Obras fundamentais -->
    <a-entity position="0 2.5 9" rotation="0 180 0">
      <a-plane width="4.5" height="2.1" color="#0f172a" opacity="0.95" position="0 0.8 0">
        <a-text value="OBRAS FUNDAMENTAIS" align="center" width="5" position="0 0.6 0.02" color="#ffb6c1"></a-text>
        <a-text value="A reescritura dos mitos clásicos e artúricos." align="center" width="3.5" position="0 0 0.02"></a-text>
      </a-plane>
      <a-image src="#img-circe"   width="1.6" height="2.4" position="-1 -0.6 0.1"></a-image>
      <a-image src="#img-esmelle" width="1.6" height="2.4" position="1 -0.6 0.1"></a-image>
      <a-plane class="area-clic" width="4.5" height="4.5" position="0 0 0.15"
               material="opacity:0; transparent:true" onclick="toggle('info3')"></a-plane>
      <a-entity id="info3" visible="false" position="0 0.2 0.3">
        <a-plane width="4.2" height="2.6" color="#222" opacity="0.8"></a-plane>
        <a-text value="'Circe ou o pracer do azul' (2009): muller dona do seu desexo. 'Morgana en Esmelle' (2012): culpa e redención nunha Galicia mitolóxica inesquecible." align="center" width="3.8" position="0 0 0.05"></a-text>
      </a-entity>
    </a-entity>

    <!-- ③ OESTE: Audio -->
    <a-entity position="-9 2.2 0" rotation="0 90 0">
      <a-ring radius-inner="1.4" radius-outer="1.55" color="#00e5ff"></a-ring>
      <a-image src="#icon-audio" width="0.8" height="0.8" position="0 0.4 0.05"></a-image>
      <a-text value="A VOZ DA AUTORA" align="center" width="6" position="0 -0.5 0.05" color="#00e5ff"></a-text>
      <a-text value="(Toca para escoitar)" align="center" width="3" position="0 -1.0 0.05" color="#ccc"></a-text>
      <a-plane class="area-clic" width="3.2" height="3.2"
               material="opacity:0; transparent:true" onclick="toggleAudio()"></a-plane>
      <a-entity id="sound-emitter" sound="src:#audio-file; volume:3"></a-entity>
    </a-entity>

    <!-- ④ LESTE: Vídeo -->
    <a-entity position="9 2.2 0" rotation="0 -90 0">
      <a-plane width="4.2" height="1.2" color="#0f172a" opacity="0.95" position="0 1.2 0">
        <a-text value="XORNALISMO POLÍTICO" align="center" width="4" color="#00e5ff"></a-text>
      </a-plane>
      <a-video src="#video-file" width="3.8" height="2.1" position="0 -0.2 0.1"></a-video>
      <a-plane class="area-clic" width="4" height="3.5" position="0 0 0.2"
               material="opacity:0; transparent:true" onclick="toggleVideo()"></a-plane>
    </a-entity>

    <!-- ⑤ NORESTE: Canto sabes? -->
    <a-entity position="6 2.2 -6" rotation="0 -45 0">
      <a-plane width="3.5" height="3" color="#0f172a" opacity="0.95">
        <a-text value="CANTO SABES?" align="center" width="4" position="0 0.9 0.02" color="#ff4d6d"></a-text>
        <a-text value="Pon a proba os teus&#10;coñecementos sobre&#10;Begoña Caamaño" align="center" width="3" position="0 0.1 0.02" color="#ccc"></a-text>
        <a-text value="★ INICIAR QUIZ ★" align="center" width="3.5" position="0 -0.8 0.02" color="#00e5ff"></a-text>
      </a-plane>
      <a-plane width="3.6" height="3.1" color="#00e5ff" opacity="0.12" position="0 0 -0.01"></a-plane>
      <a-plane class="area-clic" width="3.5" height="3" position="0 0 0.05"
               material="opacity:0; transparent:true" onclick="abrirQuiz()"></a-plane>
    </a-entity>

  </a-entity><!-- fin #museo -->
</a-scene>

<script>
const scene       = document.querySelector('a-scene');
const museo       = document.querySelector('#museo');
const reticle     = document.querySelector('#reticle');
const portadaEl   = document.getElementById('portada');
const btnQuizSala = document.getElementById('btn-quiz-sala');

function toggle(id) {
  const el = document.getElementById(id);
  el.setAttribute('visible', !el.getAttribute('visible'));
}
function toggleAudio() {
  const s = document.querySelector('#sound-emitter');
  if (!s?.components?.sound) return;
  s.components.sound.isPlaying ? s.components.sound.stopSound() : s.components.sound.playSound();
}
function toggleVideo() {
  const v = document.querySelector('#video-file');
  if (!v) return;
  v.paused ? v.play().catch(()=>{}) : v.pause();
}

/* Entra en AR: oculta portada, mostra instrucións, activa cámara */
function entrarAR() {
  portadaEl.style.display = 'none';
  document.querySelector('.portada-escolar').style.display = 'block';
  const aBtn = document.querySelector('.a-enter-vr-button');
  if (aBtn) aBtn.click();
}

/*
 * Placement do museo en AR.
 * Garda: se o quiz está aberto, non fai nada.
 * Garda: se o clic vén do interior do quiz, non fai nada.
 */
window.addEventListener('click', (e) => {
  if (e.target.closest('#quiz-panel')) return;
  if (document.getElementById('quiz-panel').classList.contains('activo')) return;
  if (scene.is('ar-mode') && reticle.getAttribute('visible')) {
    museo.setAttribute('position', reticle.getAttribute('position'));
    museo.setAttribute('visible', true);
    reticle.setAttribute('visible', false);
    document.querySelector('.portada-escolar').style.display = 'none';
    btnQuizSala.style.display = 'block';
  }
});

scene.addEventListener('enter-vr', () => {
  portadaEl.style.display = 'none';
  if (!scene.is('ar-mode')) {
    museo.setAttribute('visible', true);
    btnQuizSala.style.display = 'block';
  }
});
scene.addEventListener('exit-vr', () => {
  btnQuizSala.style.display = 'block';
});

/* ══ LÓXICA DO QUIZ ══ */
const QP = [
  { p: "En que cidade naceu Begoña Caamaño?",
    ops: ["Vigo", "Santiago de Compostela", "A Coruña", "Pontevedra"],
    ok: 0, exp: "Naceu en Vigo no ano 1964." },
  { p: "En que medio traballou como xornalista durante anos?",
    ops: ["TVG", "Radio Galega", "La Voz de Galicia", "El Correo Gallego"],
    ok: 1, exp: "Foi unha voz fundamental na Radio Galega." },
  { p: "En que ano faleceu Begoña Caamaño?",
    ops: ["2010", "2012", "2014", "2016"],
    ok: 2, exp: "Faleceu en Santiago de Compostela en 2014." },
  { p: "Cal é o título da súa novela de 2009?",
    ops: ["Morgana en Esmelle", "Circe ou o pracer do azul", "A illa das mulleres", "O libro das fadas"],
    ok: 1, exp: "'Circe ou o pracer do azul' publicouse en 2009." },
  { p: "En que ano se publicou 'Morgana en Esmelle'?",
    ops: ["2008", "2010", "2012", "2014"],
    ok: 2, exp: "'Morgana en Esmelle' publicouse en 2012." },
  { p: "Que temática atravesa principalmente a obra de Begoña Caamaño?",
    ops: ["A guerra civil española", "O feminismo e a reescritura de mitos clásicos", "A emigración galega a América", "A vida rural no século XIX"],
    ok: 1, exp: "O feminismo e a revisión dos mitos clásicos son o núcleo da súa obra." },
  { p: "A que ano das Letras Galegas corresponde a homenaxe a Begoña Caamaño?",
    ops: ["2024", "2025", "2026", "2027"],
    ok: 2, exp: "O Día das Letras Galegas 2026 está dedicado a Begoña Caamaño." }
];

let qIdx = 0, qPts = 0, qResp = false;

function abrirQuiz() {
  qIdx = 0; qPts = 0; qResp = false;
  document.getElementById('quiz-panel').classList.add('activo');
  document.getElementById('q-resultado').style.display = 'none';
  document.getElementById('q-xogo').style.display = 'block';
  qMostrar();
}
function pecharQuiz() {
  document.getElementById('quiz-panel').classList.remove('activo');
}
function qReiniciar() {
  qIdx = 0; qPts = 0; qResp = false;
  document.getElementById('q-resultado').style.display = 'none';
  document.getElementById('q-xogo').style.display = 'block';
  qMostrar();
}
function qMostrar() {
  qResp = false;
  const q = QP[qIdx], tot = QP.length;
  document.getElementById('q-barra').style.width = (qIdx / tot * 100) + '%';
  document.getElementById('q-preg').textContent = (qIdx + 1) + ' / ' + tot + ' — ' + q.p;
  document.getElementById('q-fb').textContent = '';
  document.getElementById('q-fb').className = 'q-fb';
  document.getElementById('q-btn-seg').style.display = 'none';
  const ops = document.getElementById('q-ops');
  ops.innerHTML = '';
  q.ops.forEach((o, i) => {
    const b = document.createElement('button');
    b.className = 'opcion'; b.textContent = o;
    b.onclick = () => qResponder(i);
    ops.appendChild(b);
  });
}
function qResponder(idx) {
  if (qResp) return;
  qResp = true;
  const q = QP[qIdx];
  const bts = document.querySelectorAll('.opcion');
  bts.forEach(b => b.disabled = true);
  const fb = document.getElementById('q-fb');
  if (idx === q.ok) {
    qPts++;
    bts[idx].classList.add('correcta');
    fb.textContent = '✓ Correcto! ' + q.exp;
  } else {
    bts[idx].classList.add('incorrecta');
    bts[q.ok].classList.add('correcta');
    fb.textContent = '✗ Incorrecto. ' + q.exp;
    fb.className = 'q-fb mal';
  }
  const bs = document.getElementById('q-btn-seg');
  bs.style.display = 'inline-block';
  bs.textContent = qIdx >= QP.length - 1 ? 'Ver resultado' : 'Seguinte →';
}
function qSeguinte() {
  qIdx++;
  qIdx >= QP.length ? qResultado() : qMostrar();
}
function qResultado() {
  document.getElementById('q-xogo').style.display = 'none';
  document.getElementById('q-barra').style.width = '100%';
  document.getElementById('q-resultado').style.display = 'flex';
  const tot = QP.length, pct = Math.round(qPts / tot * 100);
  document.getElementById('r-puntos').textContent = qPts + '/' + tot;
  let lb, mg, st;
  if      (pct === 100) { lb = 'Excelente!';       st = '★★★★★'; mg = 'Dominas o legado de Begoña Caamaño!'; }
  else if (pct >= 71)   { lb = 'Moi ben!';          st = '★★★★☆'; mg = 'Coñeces ben a vida e a obra desta escritora.'; }
  else if (pct >= 43)   { lb = 'Vai ben!';           st = '★★★☆☆'; mg = 'Tes boa base. Explora os paneis para completar.'; }
  else                  { lb = 'Segue aprendendo!'; st = '★★☆☆☆'; mg = 'Revisa os paneis da sala e volve tentar!'; }
  document.getElementById('r-label').textContent = lb;
  document.getElementById('r-stars').textContent = st;
  document.getElementById('r-msg').textContent   = mg;
}
</script>
</body>
</html>
